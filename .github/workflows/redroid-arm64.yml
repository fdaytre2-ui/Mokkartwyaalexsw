name: 🚀 RM64 workflow for Samsung A15

on:
  workflow_dispatch:

jobs:
  arm-redroid:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 360

    steps:
      - name: ✅ Environment Check
        run: |
          echo "Architecture: $(uname -m)"
          echo "CPUs: $(nproc)"
          echo "RAM: $(free -h)"

      - name: 🔧 Install Dependencies + Binder
        run: |
          sudo apt update
          sudo apt remove -y --purge containerd.io || true
          sudo apt autoremove -y
          sudo apt install -y docker.io adb unzip wget curl python3-pip python3-pil
          sudo systemctl enable --now docker
          sudo chmod 666 /var/run/docker.sock
          sudo apt install -y linux-modules-extra-$(uname -r)
          sudo modprobe binder_linux devices=binder,hwbinder,vndbinder || true
          pip3 install flask --break-system-packages

      - name: 📥 Download GApps + Build Image
        run: |
          wget https://github.com/MindTheGapps/14.0.0-arm64/releases/download/MindTheGapps-14.0.0-arm64-20250203_200051/MindTheGapps-14.0.0-arm64-20250203_200051.zip -O gapps.zip
          cat > Dockerfile << 'EOF'
          FROM ubuntu:22.04 as extractor
          RUN apt-get update && apt-get install -y unzip
          ADD gapps.zip /gapps.zip
          RUN mkdir -p /tmp/gapps && unzip /gapps.zip -d /tmp/gapps
          FROM redroid/redroid:14.0.0-latest
          COPY --from=extractor /tmp/gapps/system/ /system/
          RUN cp /vendor/etc/init/init.redroid.rc /vendor/etc/init/init.mt6789.rc
          EOF
          sudo docker build -t redroid-a15-arm .

      - name: 📱 Start Samsung A15
        timeout-minutes: 8
        run: |
          sudo docker run -itd --privileged --name samsung_a15 \
            -v ~/redroid_a15_data:/data \
            -p 5555:5555 \
            redroid-a15-arm \
            androidboot.redroid_width=1080 \
            androidboot.redroid_height=2340 \
            androidboot.redroid_dpi=396 \
            ro.hardware=mt6789 \
            ro.boot.hardware=mt6789 \
            ro.board.platform=k6789v1_64 \
            ro.soc.model=MT6789 \
            ro.product.model=SM-A155F \
            ro.product.brand=samsung \
            ro.product.manufacturer=samsung \
            ro.product.device=a15 \
            ro.product.name=a15nsxx \
            ro.build.fingerprint=samsung/a15nsxx/a15:14/UP1A.231005.007/A155FXXU1AXA2:user/release-keys \
            ro.build.tags=release-keys \
            ro.build.type=user \
            ro.build.id=UP1A.231005.007 \
            ro.build.display.id=UP1A.231005.007.A155FXXU1AXA2 \
            ro.build.description=a15nsxx-user.14.UP1A.231005.007.A155FXXU1AXA2.release-keys \
            ro.build.version.incremental=A155FXXU1AXA2 \
            ro.build.flavor=a15-user \
            ro.build.product=a15 \
            ro.build.host=SWDM8403 \
            ro.build.user=dpi \
            ro.build.version.security_patch=2024-05-05 \
            ro.product.odm.brand=samsung \
            ro.product.odm.device=a15 \
            ro.product.odm.manufacturer=samsung \
            ro.product.odm.model=SM-A155F \
            ro.product.odm.name=a15nsxx \
            ro.odm.build.fingerprint=samsung/a15nsxx/a15:14/UP1A.231005.007/A155FXXU1AXA2:user/release-keys \
            ro.odm.build.id=UP1A.231005.007 \
            ro.odm.build.tags=release-keys \
            ro.odm.build.type=user \
            ro.odm.build.version.incremental=A155FXXU1AXA2 \
            ro.product.product.brand=samsung \
            ro.product.product.device=a15 \
            ro.product.product.manufacturer=samsung \
            ro.product.product.model=SM-A155F \
            ro.product.product.name=a15nsxx \
            ro.product.build.fingerprint=samsung/a15nsxx/a15:14/UP1A.231005.007/A155FXXU1AXA2:user/release-keys \
            ro.product.build.id=UP1A.231005.007 \
            ro.product.build.tags=release-keys \
            ro.product.build.type=user \
            ro.product.build.version.incremental=A155FXXU1AXA2 \
            ro.product.system.brand=samsung \
            ro.product.system.device=a15 \
            ro.product.system.manufacturer=samsung \
            ro.product.system.model=SM-A155F \
            ro.product.system.name=a15 \
            ro.system.build.fingerprint=samsung/a15nsxx/a15:14/UP1A.231005.007/A155FXXU1AXA2:user/release-keys \
            ro.system.build.id=UP1A.231005.007 \
            ro.system.build.tags=release-keys \
            ro.system.build.type=user \
            ro.system.build.version.incremental=A155FXXU1AXA2 \
            ro.product.system_ext.brand=samsung \
            ro.product.system_ext.device=a15 \
            ro.product.system_ext.manufacturer=samsung \
            ro.product.system_ext.model=SM-A155F \
            ro.product.system_ext.name=a15nsxx \
            ro.system_ext.build.fingerprint=samsung/a15nsxx/a15:14/UP1A.231005.007/A155FXXU1AXA2:user/release-keys \
            ro.system_ext.build.id=UP1A.231005.007 \
            ro.system_ext.build.tags=release-keys \
            ro.system_ext.build.type=user \
            ro.system_ext.build.version.incremental=A155FXXU1AXA2 \
            ro.product.vendor.brand=samsung \
            ro.product.vendor.device=a15 \
            ro.product.vendor.manufacturer=samsung \
            ro.product.vendor.model=SM-A155F \
            ro.product.vendor.name=a15nsxx \
            ro.vendor.build.fingerprint=samsung/a15nsxx/a15:14/UP1A.231005.007/A155FXXU1AXA2:user/release-keys \
            ro.vendor.build.id=UP1A.231005.007 \
            ro.vendor.build.tags=release-keys \
            ro.vendor.build.type=user \
            ro.vendor.build.version.incremental=A155FXXU1AXA2 \
            ro.vendor.build.security_patch=2024-05-05 \
            ro.product.vendor_dlkm.brand=samsung \
            ro.product.vendor_dlkm.device=a15 \
            ro.product.vendor_dlkm.manufacturer=samsung \
            ro.product.vendor_dlkm.model=SM-A155F \
            ro.product.vendor_dlkm.name=a15nsxx \
            ro.vendor_dlkm.build.fingerprint=samsung/a15nsxx/a15:14/UP1A.231005.007/A155FXXU1AXA2:user/release-keys \
            ro.vendor_dlkm.build.id=UP1A.231005.007 \
            ro.vendor_dlkm.build.tags=release-keys \
            ro.vendor_dlkm.build.type=user \
            ro.vendor_dlkm.build.version.incremental=A155FXXU1AXA2 \
            ro.dalvik.vm.native.bridge=0 \
            ro.adb.secure=0 \
            ro.secure=0 \
            ro.debuggable=1

          echo "⏳ Waiting for container to boot..."
          STATE="none"
          for i in $(seq 1 20); do
            if ! sudo docker ps --format '{{.Names}}' | grep -q '^samsung_a15$'; then
              echo "❌ Container crashed. Logs:"
              sudo docker logs samsung_a15 || true
              exit 1
            fi
            timeout 10 adb connect localhost:5555 >/dev/null 2>&1 || true
            STATE=$(timeout 10 adb -s localhost:5555 get-state 2>/dev/null || echo "none")
            echo "Attempt $i/20: state=$STATE"
            [ "$STATE" = "device" ] && echo "✅ Device is online" && break
            sleep 5
          done
          [ "$STATE" != "device" ] && sudo docker logs samsung_a15 && exit 1

          for i in $(seq 1 15); do
            BOOT=$(timeout 10 adb -s localhost:5555 shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')
            echo "Boot $i/15: $BOOT"
            [ "$BOOT" = "1" ] && echo "✅ Boot completed" && break
            sleep 5
          done
          [ "$BOOT" != "1" ] && sudo docker logs --tail 100 samsung_a15 && exit 1

          adb -s localhost:5555 shell settings put global device_provisioned 1 || true
          adb -s localhost:5555 shell settings put secure user_setup_complete 1 || true
          adb -s localhost:5555 shell pm disable-user --user 0 com.google.android.setupwizard || true
          adb -s localhost:5555 shell settings put system screen_off_timeout 1800000 || true

          sudo docker restart samsung_a15
          sleep 10
          adb connect localhost:5555 || true

      - name: 🖥️ Start Stream Server + Cloudflare
        run: |
          cat > stream.py << 'PYEOF'
          from flask import Flask, Response
          import subprocess, threading, io, time
          from PIL import Image

          app = Flask(__name__)
          latest = b''
          lock = threading.Lock()

          def capture():
              global latest
              while True:
                  try:
                      r = subprocess.run(
                          ['adb','-s','localhost:5555','exec-out','screencap','-p'],
                          capture_output=True, timeout=5
                      )
                      if r.stdout:
                          img = Image.open(io.BytesIO(r.stdout))
                          img = img.resize((540, 1200))
                          buf = io.BytesIO()
                          img.save(buf, 'JPEG', quality=60)
                          with lock:
                              latest = buf.getvalue()
                  except:
                      time.sleep(0.3)

          threading.Thread(target=capture, daemon=True).start()

          def gen():
              while True:
                  with lock:
                      f = latest
                  if f:
                      yield b'--frame\r\nContent-Type: image/jpeg\r\n\r\n' + f + b'\r\n'
                  time.sleep(0.1)

          @app.route('/stream')
          def stream():
              return Response(gen(), mimetype='multipart/x-mixed-replace; boundary=frame')

          @app.route('/')
          def index():
              return open('index.html').read()

          @app.route('/tap/<int:x>/<int:y>')
          def tap(x,y):
              subprocess.Popen(['adb','-s','localhost:5555','shell','input','tap',str(x),str(y)])
              return 'ok'

          @app.route('/swipe/<int:x1>/<int:y1>/<int:x2>/<int:y2>/<int:d>')
          def swipe(x1,y1,x2,y2,d):
              subprocess.Popen(['adb','-s','localhost:5555','shell','input','swipe',
                               str(x1),str(y1),str(x2),str(y2),str(d)])
              return 'ok'

          @app.route('/nav/<k>')
          def nav(k):
              keys={'back':'4','home':'3','recent':'187','vup':'24','vdn':'25'}
              if k in keys:
                  subprocess.Popen(['adb','-s','localhost:5555','shell','input','keyevent',keys[k]])
              return 'ok'

          app.run(host='0.0.0.0', port=8080, threaded=True)
          PYEOF

          cat > index.html << 'HTMLEOF'
          <!DOCTYPE html><html><head>
          <meta name="viewport" content="width=device-width,initial-scale=1">
          <style>
          *{margin:0;padding:0;box-sizing:border-box}
          body{background:#000;display:flex;flex-direction:column;height:100vh}
          #s{width:100%;flex:1;object-fit:contain;display:block}
          #bar{display:flex;background:#111;padding:8px;gap:5px;position:fixed;bottom:0;width:100%}
          button{flex:1;padding:12px;background:#333;color:#fff;border:none;border-radius:8px;font-size:20px}
          button:active{background:#555}
          </style></head><body>
          <img id="s" src="/stream">
          <div id="bar">
          <button onclick="n('back')">◀</button>
          <button onclick="n('home')">⬤</button>
          <button onclick="n('recent')">▣</button>
          <button onclick="n('vup')">🔊</button>
          <button onclick="n('vdn')">🔉</button>
          </div>
          <script>
          const img=document.getElementById('s');
          let sx,sy,st;
          img.addEventListener('touchstart',e=>{
            e.preventDefault();
            const t=e.touches[0],r=img.getBoundingClientRect();
            sx=Math.round((t.clientX-r.left)*1080/r.width);
            sy=Math.round((t.clientY-r.top)*2340/r.height);
            st=Date.now();
          },{passive:false});
          img.addEventListener('touchend',e=>{
            e.preventDefault();
            const t=e.changedTouches[0],r=img.getBoundingClientRect();
            const ex=Math.round((t.clientX-r.left)*1080/r.width);
            const ey=Math.round((t.clientY-r.top)*2340/r.height);
            const d=Date.now()-st;
            if(Math.abs(ex-sx)>30||Math.abs(ey-sy)>30)
              fetch('/swipe/'+sx+'/'+sy+'/'+ex+'/'+ey+'/'+d);
            else fetch('/tap/'+ex+'/'+ey);
          },{passive:false});
          function n(k){fetch('/nav/'+k)}
          </script></body></html>
          HTMLEOF

          python3 stream.py &
          sleep 3

          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-arm64 -O cloudflared
          chmod +x cloudflared
          ./cloudflared tunnel --url http://localhost:8080 2>&1 | tee /tmp/cf.log &
          sleep 10
          grep -o 'https://.*trycloudflare.com' /tmp/cf.log | head -1

          sleep 20000
