name: 🚀 VMOS-Killer Workflow (Samsung A22 FUD)

on:
  workflow_dispatch:

jobs:
  arm-redroid:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 360

    steps:
      - name: ✅ Environment Check
        run: |
          echo "Architecture: $(uname -m)"
          echo "CPUs: $(nproc)"
          echo "RAM: $(free -h)"

      - name: 🔧 Install Dependencies + Binder
        run: |
          sudo apt update
          sudo apt remove -y --purge containerd.io || true
          sudo apt autoremove -y
          sudo apt install -y docker.io adb unzip wget curl tmate
          sudo systemctl enable --now docker
          sudo chmod 666 /var/run/docker.sock
          sudo apt install -y linux-modules-extra-$(uname -r)
          sudo modprobe binder_linux devices=binder,hwbinder,vndbinder || true

      - name: 📥 Download GApps & Inject VMOS Spoofing (Android 13 FUD Mode)
        run: |
          wget https://github.com/MindTheGapps/13.0.0-arm64/releases/download/MindTheGapps-13.0.0-arm64-20231025_200931/MindTheGapps-13.0.0-arm64-20231025_200931.zip -O gapps.zip
          
          mkdir -p overlay/vendor/etc/init
          cat > overlay/vendor/etc/init/vmos_spoof.rc << 'EOF'
          on early-init
              # إخفاء هوية Redroid بالكامل وتزوير المعالج
              setprop ro.boot.hardware mt6769t
              setprop ro.hardware mt6769t
              setprop ro.board.platform mt6768
              setprop ro.soc.manufacturer Mediatek
              setprop ro.soc.model MT6769V/CT
              
              # التقفيل الأمني (بدون قفل ADB)
              setprop ro.boot.verifiedbootstate green
              setprop ro.boot.vbmeta.device_state locked
              setprop ro.boot.flash.locked 1
              setprop ro.boot.veritymode enforcing
              setprop ro.build.type user
              setprop ro.build.tags release-keys
              setprop sys.oem_unlock_allowed 0
          EOF

          cat > Dockerfile << 'EOF'
          FROM redroid/redroid:13.0.0-latest AS redroid_base

          FROM ubuntu:22.04 AS extractor
          RUN apt-get update && apt-get install -y unzip
          ADD gapps.zip /gapps.zip
          RUN mkdir -p /tmp/gapps && unzip /gapps.zip -d /tmp/gapps
          
          # إنشاء مجلدات مؤقتة وتجهيز ملفات الهاردوير (The Magic Fix)
          RUN mkdir -p /tmp/hw32 /tmp/hw64 /tmp/init
          COPY --from=redroid_base /vendor/lib/hw/ /tmp/hw32_src/
          COPY --from=redroid_base /vendor/lib64/hw/ /tmp/hw64_src/
          COPY --from=redroid_base /vendor/etc/init/ /tmp/init_src/

          # تغيير الأسماء داخل بيئة أوبونتو الآمنة
          RUN cp /tmp/hw32_src/audio.primary.redroid.so /tmp/hw32/audio.primary.mt6769t.so || true
          RUN cp /tmp/hw32_src/camera.redroid.so /tmp/hw32/camera.mt6769t.so || true
          RUN cp /tmp/hw32_src/gralloc.redroid.so /tmp/hw32/gralloc.mt6769t.so || true
          RUN cp /tmp/hw32_src/hwcomposer.redroid.so /tmp/hw32/hwcomposer.mt6769t.so || true
          RUN cp /tmp/hw32_src/sensors.redroid.so /tmp/hw32/sensors.mt6769t.so || true

          RUN cp /tmp/hw64_src/audio.primary.redroid.so /tmp/hw64/audio.primary.mt6769t.so || true
          RUN cp /tmp/hw64_src/camera.redroid.so /tmp/hw64/camera.mt6769t.so || true
          RUN cp /tmp/hw64_src/gralloc.redroid.so /tmp/hw64/gralloc.mt6769t.so || true
          RUN cp /tmp/hw64_src/hwcomposer.redroid.so /tmp/hw64/hwcomposer.mt6769t.so || true
          RUN cp /tmp/hw64_src/sensors.redroid.so /tmp/hw64/sensors.mt6769t.so || true

          RUN cp /tmp/init_src/init.redroid.rc /tmp/init/init.mt6769t.rc || true
          
          FROM redroid/redroid:13.0.0-latest
          COPY --from=extractor /tmp/gapps/system/ /system/
          COPY overlay/vendor/etc/init/vmos_spoof.rc /vendor/etc/init/vmos_spoof.rc

          # حقن الملفات الجاهزة بعد تغيير اسمها
          COPY --from=extractor /tmp/hw32/ /vendor/lib/hw/
          COPY --from=extractor /tmp/hw64/ /vendor/lib64/hw/
          COPY --from=extractor /tmp/init/ /vendor/etc/init/
          EOF
          
          sudo docker build -t redroid-a22-fud .

      - name: 📱 Start Samsung A22 (VMOS Clone)
        timeout-minutes: 8
        run: |
          sudo docker run -itd --privileged --name samsung_a22 \
            -v ~/redroid_data:/data \
            -p 5555:5555 \
            redroid-a22-fud \
            androidboot.redroid_width=1080 \
            androidboot.redroid_height=2340 \
            androidboot.redroid_dpi=300 \
            ro.secure=1 \
            ro.debuggable=0 \
            ro.adb.secure=0 \
            ro.hardware.gralloc=mt6769t \
            ro.product.brand=samsung \
            ro.product.manufacturer=samsung \
            ro.product.model=SM-A225F \
            ro.product.device=a22 \
            ro.product.name=a22nstur \
            ro.build.fingerprint=samsung/a22nstur/a22:13/TP1A.220624.014/A225FXXU6DWE3:user/release-keys \
            ro.build.id=TP1A.220624.014 \
            ro.build.tags=release-keys \
            ro.build.type=user \
            ro.build.flavor=a22nsxx-user \
            ro.build.version.incremental=A225FXXU6DWE3 \
            ro.build.version.security_patch=2026-03-05 \
            ro.product.system.brand=samsung \
            ro.product.system.device=a22 \
            ro.product.system.manufacturer=samsung \
            ro.product.system.model=SM-A225F \
            ro.product.system.name=a22nsxx \
            ro.product.system_ext.brand=samsung \
            ro.product.system_ext.device=a22 \
            ro.product.system_ext.manufacturer=samsung \
            ro.product.system_ext.model=SM-A225F \
            ro.product.system_ext.name=a22nsxx \
            ro.product.vendor.brand=samsung \
            ro.product.vendor.device=a22 \
            ro.product.vendor.manufacturer=samsung \
            ro.product.vendor.model=SM-A225F \
            ro.product.vendor.name=a22nsxx \
            ro.product.odm.brand=samsung \
            ro.product.odm.device=a22 \
            ro.product.odm.manufacturer=samsung \
            ro.product.odm.model=SM-A225F \
            ro.product.odm.name=a22nsxx \
            ro.product.vendor_dlkm.brand=samsung \
            ro.product.vendor_dlkm.device=a22 \
            ro.product.vendor_dlkm.manufacturer=samsung \
            ro.product.vendor_dlkm.model=SM-A225F \
            ro.product.vendor_dlkm.name=a22nsxx \
            ro.dalvik.vm.native.bridge=0

          echo "⏳ Waiting for container to boot..."
          STATE="none"
          for i in $(seq 1 20); do
            if ! sudo docker ps --format '{{.Names}}' | grep -q '^samsung_a22$'; then
              echo "❌ Container is not running (crashed)."
              sudo docker logs samsung_a22 || true
              exit 1
            fi
            timeout 10 adb connect localhost:5555 >/dev/null 2>&1 || true
            STATE=$(timeout 10 adb -s localhost:5555 get-state 2>/dev/null || echo "none")
            if [ "$STATE" = "device" ]; then
              echo "✅ Device is online"
              break
            fi
            sleep 5
          done

          if [ "$STATE" != "device" ]; then
            echo "❌ Device never reached 'device' state. Container logs:"
            sudo docker logs samsung_a22 || true
            exit 1
          fi

          BOOT_COMPLETED="0"
          for i in $(seq 1 15); do
            BOOT_COMPLETED=$(timeout 10 adb -s localhost:5555 shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')
            if [ "$BOOT_COMPLETED" = "1" ]; then
              echo "✅ Boot completed"
              break
            fi
            sleep 5
          done

          timeout 10 adb -s localhost:5555 shell settings put global device_provisioned 1 || true
          timeout 10 adb -s localhost:5555 shell settings put secure user_setup_complete 1 || true
          timeout 10 adb -s localhost:5555 shell pm disable-user --user 0 com.google.android.setupwizard || true
          timeout 10 adb -s localhost:5555 shell settings put system screen_off_timeout 1800000 || true

          echo "🔁 Restarting container to apply settings..."
          sudo docker restart samsung_a22

          sleep 10
          timeout 10 adb connect localhost:5555 >/dev/null 2>&1 || true

      - name: 💻 Open SSH Tunnel for ADB (Termux Connection)
        run: |
          tmate -S /tmp/tmate.sock new-session -d
          tmate -S /tmp/tmate.sock wait tmate-ready
          echo "========================================================="
          echo "🛠️ Remote ADB Command (For Termux):"
          tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}'
          echo "========================================================="

      - name: 🖥️ Start 60FPS Stream Server (ws-scrcpy)
        run: |
          sudo fuser -k 8000/tcp || true
          curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
          sudo apt-get install -y nodejs

          git clone https://github.com/NetrisTV/ws-scrcpy.git
          cd ws-scrcpy
          npm install
          npm start &

          echo "⏳ Waiting for ws-scrcpy to start..."
          sleep 15
          cd ..

          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-arm64 -O cloudflared
          chmod +x cloudflared
          ./cloudflared tunnel --url http://localhost:8000 2>&1 | tee /tmp/cf.log &

          sleep 10
          echo "========================================================="
          echo "🚀 Web Stream URL:"
          grep -o 'https://.*trycloudflare.com' /tmp/cf.log | head -1
          echo "========================================================="

          sleep 20000
