name: 🚀 VMOS-Killer Pro (Samsung A22 + FUD + Deep Hardware Spoof)

on:
  workflow_dispatch:

jobs:
  arm-redroid:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 360

    steps:
      - name: ✅ Environment Check
        run: |
          echo "Architecture: $(uname -m)"
          echo "CPUs: $(nproc)"
          echo "RAM: $(free -h)"

      - name: 🔧 Install Dependencies & Fix Kernel
        run: |
          sudo apt-get update -qq
          sudo apt-get remove -y --purge containerd.io || true
          sudo apt-get autoremove -y
          sudo apt-get install -y docker.io adb unzip wget curl tmate linux-modules-extra-$(uname -r)
          sudo systemctl enable --now docker
          sudo chmod 666 /var/run/docker.sock
          
          # تفعيل خدمات الكيرنل الأساسية
          sudo modprobe binder_linux devices="binder,hwbinder,vndbinder" || true
          sudo modprobe ashmem_linux 2>/dev/null || true

      - name: 📥 Download GApps & Build Super Image (MT6769 Spoofing)
        run: |
          wget https://github.com/MindTheGapps/13.0.0-arm64/releases/download/MindTheGapps-13.0.0-arm64-20231025_200931/MindTheGapps-13.0.0-arm64-20231025_200931.zip -O gapps.zip
          cat > Dockerfile << 'EOF'
          # 1. سحب النظام الأساسي
          FROM redroid/redroid:13.0.0-latest AS redroid_base

          # 2. بيئة العمل واستخراج GApps
          FROM ubuntu:22.04 AS extractor
          RUN apt-get update && apt-get install -y unzip
          ADD gapps.zip /gapps.zip
          RUN mkdir -p /tmp/gapps && unzip /gapps.zip -d /tmp/gapps
          
          # 3. السحر الهندسي: استنساخ وتغيير أسماء تعريفات الشاشة لمعالج A22 (MT6769)
          COPY --from=redroid_base /vendor/etc/init/init.redroid.rc /tmp/init.mt6769.rc
          COPY --from=redroid_base /vendor/lib/hw/gralloc.redroid.so /tmp/gralloc.mt6769.so
          COPY --from=redroid_base /vendor/lib/hw/hwcomposer.redroid.so /tmp/hwcomposer.mt6769.so
          COPY --from=redroid_base /vendor/lib64/hw/gralloc.redroid.so /tmp/gralloc64.mt6769.so
          COPY --from=redroid_base /vendor/lib64/hw/hwcomposer.redroid.so /tmp/hwcomposer64.mt6769.so

          # 4. بناء النظام النهائي ودمج الملفات
          FROM redroid/redroid:13.0.0-latest
          COPY --from=extractor /tmp/gapps/system/ /system/
          
          # 5. حقن التعريفات المموهة داخل النظام
          COPY --from=extractor /tmp/init.mt6769.rc /vendor/etc/init/init.mt6769.rc
          COPY --from=extractor /tmp/gralloc.mt6769.so /vendor/lib/hw/gralloc.mt6769.so
          COPY --from=extractor /tmp/hwcomposer.mt6769.so /vendor/lib/hw/hwcomposer.mt6769.so
          COPY --from=extractor /tmp/gralloc64.mt6769.so /vendor/lib64/hw/gralloc.mt6769.so
          COPY --from=extractor /tmp/hwcomposer64.mt6769.so /vendor/lib64/hw/hwcomposer.mt6769.so
          EOF
          sudo docker build -t redroid-a22-super .

      - name: 📱 Start Samsung A22 (The Ultimate Factory)
        timeout-minutes: 15
        run: |
          # 🎲 محرك التوليد العشوائي لهوية الجهاز
          RANDOM_SERIAL="R58$(tr -dc A-Z0-9 </dev/urandom | head -c 8)"
          RANDOM_MAC="02:00:00:$(openssl rand -hex 3 | sed 's/\(..\)/\1:/g; s/.$//')"
          RANDOM_UNIQUE=$(openssl rand -hex 8)
          RANDOM_PAD=$(tr -dc A-Z0-9 </dev/urandom | head -c 16)
          RANDOM_IMEI="35$(tr -dc 0-9 </dev/urandom | head -c 13)"
          
          echo "====================================="
          echo "🆕 Generating New Device Identity:"
          echo "Serial: $RANDOM_SERIAL"
          echo "MAC: $RANDOM_MAC"
          echo "IMEI: $RANDOM_IMEI"
          echo "====================================="
          
          sudo docker run -itd --privileged --name samsung_a22 \
            -p 5555:5555 \
            redroid-a22-super \
            androidboot.use_memfd=true \
            androidboot.redroid_gpu_mode=guest \
            androidboot.redroid_width=720 \
            androidboot.redroid_height=1280 \
            androidboot.redroid_dpi=320 \
            androidboot.authorize_adb_keys=0 \
            androidboot.adb.secure=0 \
            androidboot.debuggable=1 \
            androidboot.secure=0 \
            androidboot.verifiedbootstate=green \
            androidboot.vbmeta.device_state=locked \
            androidboot.flash.locked=1 \
            androidboot.veritymode=enforcing \
            ro.adb.secure=0 \
            ro.secure=1 \
            ro.debuggable=0 \
            ro.hardware=mt6769 \
            ro.boot.hardware=mt6769 \
            ro.board.platform=mt6769 \
            ro.hardware.gralloc=mt6769 \
            ro.hardware.egl=mali \
            ro.hardware.vulkan=mali \
            ro.product.brand=samsung \
            ro.product.manufacturer=samsung \
            ro.product.model=SM-A225F \
            ro.product.device=a22 \
            ro.product.name=a22nstur \
            ro.soc.manufacturer=Mediatek \
            ro.soc.model=MT6769V/CT \
            ro.build.id=TP1A.220624.014 \
            ro.build.tags=release-keys \
            ro.build.type=user \
            ro.build.user=dpi \
            ro.build.host=SWDM8403 \
            ro.build.flavor=a22nsxx-user \
            ro.build.product=a22 \
            ro.build.version.incremental=A225FXXU6DWE3 \
            ro.build.description="a22nsxx-user 13 TP1A.220624.014 A225FXXU6DWE3 release-keys" \
            ro.build.display.id="TP1A.220624.014.A225FXXU6DWE3" \
            ro.build.fingerprint=samsung/a22nstur/a22:13/TP1A.220624.014/A225FXXU6DWE3:user/release-keys \
            ro.system.build.fingerprint=samsung/a22nstur/a22:13/TP1A.220624.014/A225FXXU6DWE3:user/release-keys \
            ro.vendor.build.fingerprint=samsung/a22nstur/a22:13/TP1A.220624.014/A225FXXU6DWE3:user/release-keys \
            ro.odm.build.fingerprint=samsung/a22nstur/a22:13/TP1A.220624.014/A225FXXU6DWE3:user/release-keys \
            ro.product.build.fingerprint=samsung/a22nstur/a22:13/TP1A.220624.014/A225FXXU6DWE3:user/release-keys \
            ro.system_ext.build.fingerprint=samsung/a22nstur/a22:13/TP1A.220624.014/A225FXXU6DWE3:user/release-keys \
            ro.vendor_dlkm.build.fingerprint=samsung/a22nstur/a22:13/TP1A.220624.014/A225FXXU6DWE3:user/release-keys \
            ro.system.build.tags=release-keys \
            ro.system.build.type=user \
            ro.vendor.build.tags=release-keys \
            ro.vendor.build.type=user \
            ro.odm.build.tags=release-keys \
            ro.odm.build.type=user \
            ro.product.build.tags=release-keys \
            ro.product.build.type=user \
            ro.system_ext.build.tags=release-keys \
            ro.system_ext.build.type=user \
            ro.vendor_dlkm.build.tags=release-keys \
            ro.vendor_dlkm.build.type=user \
            ro.product.odm.brand=samsung \
            ro.product.odm.device=a22 \
            ro.product.odm.manufacturer=samsung \
            ro.product.odm.model=SM-A225F \
            ro.product.odm.name=a22nstur \
            ro.product.product.brand=samsung \
            ro.product.product.device=a22 \
            ro.product.product.manufacturer=samsung \
            ro.product.product.model=SM-A225F \
            ro.product.product.name=a22nstur \
            ro.product.system.brand=samsung \
            ro.product.system.device=a22 \
            ro.product.system.manufacturer=samsung \
            ro.product.system.model=SM-A225F \
            ro.product.system.name=a22nstur \
            ro.product.system_ext.brand=samsung \
            ro.product.system_ext.device=a22 \
            ro.product.system_ext.manufacturer=samsung \
            ro.product.system_ext.model=SM-A225F \
            ro.product.system_ext.name=a22nstur \
            ro.product.vendor.brand=samsung \
            ro.product.vendor.device=a22 \
            ro.product.vendor.manufacturer=samsung \
            ro.product.vendor.model=SM-A225F \
            ro.product.vendor.name=a22nstur \
            ro.product.vendor_dlkm.brand=samsung \
            ro.product.vendor_dlkm.device=a22 \
            ro.product.vendor_dlkm.manufacturer=samsung \
            ro.product.vendor_dlkm.model=SM-A225F \
            ro.product.vendor_dlkm.name=a22nstur \
            ro.boot.serialno=$RANDOM_SERIAL \
            ro.serialno=$RANDOM_SERIAL \
            ro.boot.wifimacaddr=$RANDOM_MAC \
            ro.boot.btmacaddr=$RANDOM_MAC \
            ro.boot.uniqueno=$RANDOM_UNIQUE \
            ro.boot.pad_code=$RANDOM_PAD \
            persist.sys.cloud.imeinum=$RANDOM_IMEI


          echo "⏳ الخوارزمية الذكية: جاري فحص حالة اتصال النظام (Smart Boot Check)..."
          STATE="none"
          for i in $(seq 1 20); do
            if ! sudo docker ps --format '{{.Names}}' | grep -q '^samsung_a22$'; then
              echo "❌ الحاوية توقفت عن العمل. السجلات:"
              sudo docker logs samsung_a22 || true
              exit 1
            fi
            timeout 10 adb connect localhost:5555 >/dev/null 2>&1 || true
            STATE=$(timeout 10 adb -s localhost:5555 get-state 2>/dev/null || echo "none")
            echo "محاولة $i/20: حالة الجهاز = $STATE"
            if [ "$STATE" = "device" ]; then
              echo "✅ الجهاز متصل برمجياً."
              break
            fi
            sleep 5
          done

          echo "⏳ الخوارزمية الذكية: جاري انتظار اكتمال واجهة النظام (UI Boot)..."
          BOOT_COMPLETED="0"
          for i in $(seq 1 15); do
            BOOT_COMPLETED=$(timeout 10 adb -s localhost:5555 shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')
            echo "فحص الإقلاع $i/15: sys.boot_completed=$BOOT_COMPLETED"
            if [ "$BOOT_COMPLETED" = "1" ]; then
              echo "✅ اكتمل الإقلاع بنجاح!"
              break
            fi
            sleep 5
          done

      - name: 💻 ADB Connect & Setup Config
        run: |
          echo "🔄 حقن مفاتيح ADB الخاصة للتحكم..."
          mkdir -p ~/.android
          adb keygen ~/.android/adbkey || true
          cat ~/.android/adbkey.pub | sudo docker exec -i samsung_a22 sh -c "mkdir -p /data/misc/adb && cat > /data/misc/adb/adb_keys && chown 2000:2000 /data/misc/adb/adb_keys && chmod 600 /data/misc/adb/adb_keys"
          sudo docker exec samsung_a22 setprop ctl.restart adbd
          sleep 5
          
          adb kill-server
          adb connect localhost:5555
          sleep 3
          
          # 🎲 توليد Android ID عشوائي وحقنه
          RANDOM_ANDROID_ID=$(openssl rand -hex 8)
          echo "Android ID: $RANDOM_ANDROID_ID"
          adb shell settings put secure android_id $RANDOM_ANDROID_ID || true
          
          # إعدادات الشاشة لمنع الإغلاق وتخطي شاشة القفل الأولى
          adb shell settings put system screen_off_timeout 1800000 || true
          adb shell input keyevent 224 || true
          adb shell input keyevent 82 || true
          
          echo "✅ النظام جاهز بالكامل والتمويه نشط!"

      - name: 🖥️ Start 60FPS Stream Server (ws-scrcpy)
        run: |
          sudo fuser -k 8000/tcp || true
          
          curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
          sudo apt-get install -y nodejs
          
          git clone https://github.com/NetrisTV/ws-scrcpy.git
          cd ws-scrcpy
          npm install
          npm start &
          
          echo "⏳ جاري تشغيل سيرفر البث..."
          sleep 15
          cd ..
          
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-arm64 -O cloudflared
          chmod +x cloudflared
          ./cloudflared tunnel --url http://localhost:8000 2>&1 | tee /tmp/cf.log &
          
          sleep 10
          echo "========================================================="
          echo "🚀 Web Stream URL (اضغط هنا لفتح الموبايل الجديد وإكمال الإعدادات):"
          grep -o 'https://.*trycloudflare.com' /tmp/cf.log | head -1
          echo "========================================================="

      - name: 🛡️ Tmate Terminal (For Direct SSH / Termux Access)
        run: |
          tmate -S /tmp/tmate.sock new-session -d
          tmate -S /tmp/tmate.sock wait tmate-ready
          echo "========================================================="
          echo "🛠️ للتحكم عبر Termux أو SSH السريع، استخدم الرابط التالي:"
          tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}'
          echo "💡 بعد الدخول، اكتب: adb -s localhost:5555 shell"
          echo "========================================================="
          
          sleep 20000
