name: 🚀 RM64 workflow for Samsung A15

on:
  workflow_dispatch:

jobs:
  arm-redroid:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 360

    steps:
      - name: ✅ Environment Check
        run: |
          echo "Architecture: $(uname -m)"
          echo "CPUs: $(nproc)"
          echo "RAM: $(free -h)"

      - name: 🔧 Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y docker.io adb unzip wget curl jq lsof psmisc
          sudo systemctl enable --now docker
          sudo chmod 666 /var/run/docker.sock

      - name: 📥 Download GApps + Build Image (Precision FUD)
        run: |
          wget https://github.com/MindTheGapps/14.0.0-arm64/releases/download/MindTheGapps-14.0.0-arm64-20250203_200051/MindTheGapps-14.0.0-arm64-20250203_200051.zip -O gapps.zip
          
          cat > Dockerfile << 'EOF'
          FROM redroid/redroid:14.0.0-latest AS redroid_base

          FROM ubuntu:22.04 AS extractor
          RUN apt-get update && apt-get install -y unzip sed
          ADD gapps.zip /gapps.zip
          RUN mkdir -p /tmp/gapps && unzip /gapps.zip -d /tmp/gapps

          COPY --from=redroid_base /system /tmp/system
          COPY --from=redroid_base /vendor /tmp/vendor
          COPY --from=redroid_base /vendor/etc/init/init.redroid.rc /tmp/init.mt6789.rc
          COPY --from=redroid_base /vendor/lib/hw/gralloc.redroid.so /tmp/gralloc.mt6789.so
          COPY --from=redroid_base /vendor/lib/hw/hwcomposer.redroid.so /tmp/hwcomposer.mt6789.so
          COPY --from=redroid_base /vendor/lib64/hw/gralloc.redroid.so /tmp/gralloc64.mt6789.so
          COPY --from=redroid_base /vendor/lib64/hw/hwcomposer.redroid.so /tmp/hwcomposer64.mt6789.so

          # تعديلات دقيقة ومستهدفة
          RUN sed -i 's/ro.hardware=redroid/ro.hardware=mt6789/g' /tmp/vendor/build.prop || true
          RUN sed -i 's/ro.board.platform=/ro.board.platform=mt6789/g' /tmp/vendor/build.prop || true
          RUN sed -i 's/ro.product.board=/ro.product.board=mt6789/g' /tmp/vendor/build.prop || true

          RUN find /tmp/system /tmp/vendor -type f -name "*.prop" -exec sed -i 's/redroid/samsung/gi' {} + || true
          RUN find /tmp/system /tmp/vendor -type f -name "*.prop" -exec sed -i 's/redroid_arm64/a15nsxx/g' {} + || true
          RUN find /tmp/system /tmp/vendor -type f -name "*.prop" -exec sed -i 's/redroid14_arm64/SM-A155F/g' {} + || true

          FROM redroid/redroid:14.0.0-latest
          COPY --from=extractor /tmp/gapps/system/ /system/
          COPY --from=extractor /tmp/system/ /system/
          COPY --from=extractor /tmp/vendor/ /vendor/
          COPY --from=extractor /tmp/init.mt6789.rc /vendor/etc/init/init.mt6789.rc
          COPY --from=extractor /tmp/gralloc.mt6789.so /vendor/lib/hw/gralloc.mt6789.so
          COPY --from=extractor /tmp/hwcomposer.mt6789.so /vendor/lib/hw/hwcomposer.mt6789.so
          COPY --from=extractor /tmp/gralloc64.mt6789.so /vendor/lib64/hw/gralloc.mt6789.so
          COPY --from=extractor /tmp/hwcomposer64.mt6789.so /vendor/lib64/hw/hwcomposer.mt6789.so
          EOF

          sudo docker build -t redroid-a15-arm .

      - name: 📱 Start Samsung A15
        timeout-minutes: 10
        run: |
          sudo docker run -itd --privileged --name samsung_a15 \
            -v \~/redroid_a15_data:/data \
            -p 5555:5555 \
            redroid-a15-arm \
            ro.hardware=mt6789 \
            ro.boot.hardware=mt6789 \
            ro.board.platform=mt6789 \
            ro.soc.model=MT6789 \
            ro.product.model=SM-A155F \
            ro.product.brand=samsung \
            ro.product.manufacturer=samsung \
            ro.product.device=a15 \
            ro.product.name=a15nsxx \
            ro.build.fingerprint=samsung/a15nsxx/a15:14/UP1A.231005.007/A155FXXU1AXA2:user/release-keys \
            ro.build.tags=release-keys \
            ro.build.type=user \
            ro.build.id=UP1A.231005.007 \
            ro.build.display.id=UP1A.231005.007.A155FXXU1AXA2 \
            ro.build.flavor=a15-user \
            ro.build.product=a15 \
            ro.build.version.security_patch=2024-05-05

          echo "⏳ Waiting for boot..."
          sleep 25
          adb connect localhost:5555

          for i in {1..25}; do
            if adb -s localhost:5555 shell getprop sys.boot_completed | grep -q "1"; then
              echo "✅ Boot completed successfully"
              break
            fi
            echo "Boot check $i/25..."
            sleep 6
          done

          # طباعة الخصائص المهمة للتحقق
          echo "=== Device Properties Check ==="
          adb -s localhost:5555 shell getprop | grep -E "ro.hardware|ro.product.model|ro.build.fingerprint|ro.board.platform|redroid"

      - name: 🔌 Open ADB Tunnel & Stream
        run: |
          sudo lsof -t -i:8000 | xargs -r sudo kill -9 || true
          sudo lsof -t -i:5555 | xargs -r sudo kill -9 || true

          # Bore Tunnel
          wget -q https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-aarch64-unknown-linux-musl.tar.gz
          tar -xzf bore-v0.5.1-aarch64-unknown-linux-musl.tar.gz
          chmod +x bore
          ./bore local 5555 --to bore.pub > /tmp/bore.log 2>&1 &

          # ws-scrcpy + Cloudflare
          curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
          sudo apt-get install -y nodejs
          git clone https://github.com/NetrisTV/ws-scrcpy.git
          cd ws-scrcpy && npm install && npm start &

          sleep 12

          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-arm64 -O cloudflared
          chmod +x cloudflared
          ./cloudflared tunnel --url http://localhost:8000 2>&1 | tee /tmp/cf.log &

          sleep 8

          ADB_URL=$(grep -o 'bore.pub:[0-9]*' /tmp/bore.log | head -n1)
          WEB_URL=$(grep -o 'https://[^ ]*\.trycloudflare.com' /tmp/cf.log | head -n1)

          echo "========================================================="
          echo "🚀 Samsung A15 Emulator جاهز!"
          echo "🌐 Web Stream (الشاشة): $WEB_URL"
          echo "📱 ADB Connect: adb connect $ADB_URL"
          echo "========================================================="
          
          sleep 30000
